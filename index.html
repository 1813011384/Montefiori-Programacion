    <script>

/****************************************************************************************************/

// Parsea "HH:mm:ss" o "HH:mm" a Date
function parseHora(horaStr) {
  const [h, m, s] = horaStr.split(":").map(Number);
  return new Date(0, 0, 0, h, m, s || 0);
}

// Formatea Date a "HH:mm"
function formatearHora(date) {
  return date.toTimeString().substring(0, 5);
}

// Genera bloques de 30 minutos
function generarBloquesDelDia() {
  const bloques = [];
  let inicio = new Date(0, 0, 0, 0, 0);
  const fin = new Date(0, 0, 0, 23, 30);

  while (inicio <= fin) {
    const siguiente = new Date(inicio.getTime() + 30 * 60000);
    bloques.push({ inicio: new Date(inicio), fin: new Date(siguiente) });
    inicio = siguiente;
  }

  return bloques;
}

// Función principal
function agregarRangos30MinutosConBloqueo(turnos) {
  const bloques = generarBloquesDelDia();

  turnos.forEach(turno => {
    const turnoInicio = parseHora(turno.HORA_INICIO);
    const turnoFin = parseHora(turno.HORA_FIN);

    let bloqueoInicio = null;
    let bloqueoFin = null;

    if (turno.BLOQUEADO && turno.BLOQUEADO.includes("-")) {
      const [bloqIniStr, bloqFinStr] = turno.BLOQUEADO.split(" - ").map(str => str.trim());
      bloqueoInicio = parseHora(bloqIniStr);
      bloqueoFin = parseHora(bloqFinStr);
    }

    const rangos = [];
    const solorango=[];

    bloques.forEach(b => {
      const interseccionInicio = new Date(Math.max(turnoInicio, b.inicio));
      const interseccionFin = new Date(Math.min(turnoFin, b.fin));

      if (interseccionInicio < interseccionFin) {
        let interseccionBloqueo = "";

        if (bloqueoInicio && bloqueoFin) {
          const bloqIntIni = new Date(Math.max(bloqueoInicio, b.inicio));
          const bloqIntFin = new Date(Math.min(bloqueoFin, b.fin));

          if (bloqIntIni < bloqIntFin) {
            interseccionBloqueo = `${formatearHora(bloqIntIni)} - ${formatearHora(bloqIntFin)}`;
          }
        }

        rangos.push({
          RANGO: `${formatearHora(b.inicio)} - ${formatearHora(b.fin)}`,
          INTERSECCION: `${formatearHora(interseccionInicio)} - ${formatearHora(interseccionFin)}`,
          INTERSECCION_BLOQUEO: interseccionBloqueo
        });
        solorango.push(`${formatearHora(b.inicio)} - ${formatearHora(b.fin)}`);
      }
    });

    turno.RANGOS_30_MINUTOS = rangos;
    turno.SOLORANGO= solorango;
  });

  return turnos
}

function generarDiasEntre(fechaInicio, fechaFin) {
  const dias = [];
  const actual = new Date(fechaInicio);

  while (actual <= fechaFin) {
    dias.push(new Date(actual)); // Clona la fecha
    actual.setDate(actual.getDate() + 1);
  }

  return dias;
}

function calcularGradiente(dispi,dispf,bloi,blof){
    //console.log(dispi+" "+dispf+" "+ bloi+ " "+ blof);
    let di=parseHora(dispi);
    let df=parseHora(dispf);
    let bli=parseHora(bloi);
    let blf=parseHora(blof);

    let tamaniod=df-di;
    let tamaniob=blf-bli;
    //console.log(tamaniod+" "+ tamaniob);
    let verdepercent= (tamaniod-tamaniob)/tamaniod *100;
    let rojopercent= tamaniob/tamaniod *100;

    return `linear-gradient(to right, #f9d6d5 ${rojopercent}% , #e8f5e9  ${rojopercent}% )`;


}

function mostrarLoader() {
  document.getElementById('loader').style.display = 'flex';
}

function ocultarLoader() {
  document.getElementById('loader').style.display = 'none';
}

    let filtrado=aux.filter(e=> (espFiltro.value === "TODOS" || e.ESPECIALIDAD===espFiltro.value) && (consultorioFiltro.value==="TODOS" || e.CONSULTORIO===consultorioFiltro.value) && ( fechaDesde.value==="" || e.FECHA>=fechaDesde.value) && (fechaHasta.value==="" || e.FECHA<=fechaHasta.value));
    document.querySelector("#mitabla1 thead tr").innerHTML="";
    document.querySelector("#mitabla1 tbody").innerHTML="";
    
        
        renderizartabla(filtrado);
        ocultarLoader();
    }, 0);
    

}

function renderizartabla(turnosconrango){
    const fechas = turnosconrango
    .map(t => t.FECHA?.trim())          // Quitamos espacios
    .filter(f => f)                     // Eliminamos vacíos, null o undefined
    .map(f => {
        const [anio, mes, dia] = f.split("-");
        return new Date(anio, mes - 1, dia);
    });

    const fechaMin = new Date(Math.min(...fechas));// ... al array fechas le quita los corchetes
    const fechaMax = new Date(Math.max(...fechas));// ... al array fechas le quita los corchetes

    let todosdias= generarDiasEntre(fechaMin,fechaMax);

    let tabla1theadtr=document.querySelector("#mitabla1 thead tr");
    tabla1theadtr.innerHTML=`<th>Rango Horario</th>`
    todosdias.forEach(dd=>{
        const diasSemana = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const ano = dd.getFullYear();
        const mes = String(dd.getMonth() + 1).padStart(2, '0'); // mês começa do 0
        const dia = String(dd.getDate()).padStart(2, '0');
        const dia2=diasSemana[dd.getDay()].substring(0,3);
        const dataFormatada = `${dia2} ${dia}/${mes}/${ano}`;

        let th= document.createElement("th");
        th.innerHTML=`${dataFormatada}`
        tabla1theadtr.appendChild(th);
        
    });

    let rangohoras=generarBloquesDelDia();
    let rangoshoras7a22=rangohoras.filter(e => (e.inicio>=parseHora("07:00:00") && e.fin<=parseHora("22:00:00")));

    /*console.log(turnosconrango);
    console.log(turnos);
    console.log(todosdias);
    console.log(rangoshoras7a22);*/

    rangoshoras7a22.map(r => {
        let rangodeterminado=formatearHora(r.inicio)+" - "+formatearHora(r.fin);
        let trrrr=document.createElement("tr");
        trrrr.innerHTML=`<td><strong>${rangodeterminado}</strong></td>`;
        
        let td=null;
        todosdias.map( d =>{
            td=document.createElement("td");
            const ano = d.getFullYear();
            const mes = String(d.getMonth() + 1).padStart(2, '0'); // mês começa do 0
            const dia = String(d.getDate()).padStart(2, '0');
            let dataFormatada = `${ano}-${mes}-${dia}`;
            //console.log(rangodeterminado,dataFormatada);
            //let turnosconrangodeterminado=[];
            let turnosencontrados=turnosconrango.filter(e=> e.FECHA==dataFormatada && e.SOLORANGO.includes(rangodeterminado));

            turnosencontrados.forEach(e=> { 
                let [di,df]=e.RANGOS_30_MINUTOS.filter(o=>o.RANGO===rangodeterminado)[0].INTERSECCION.split(" - ");
                let [bi,bf]=e.RANGOS_30_MINUTOS.filter(o=>o.RANGO===rangodeterminado)[0].INTERSECCION_BLOQUEO.split(" - ");
                if(bi==="" || bi===undefined){ bi="00:00"}
                if(bf==="" || bf===undefined){ bf="00:00"}
                //console.log(parsehora(di)+" "+df);
                let fondo= calcularGradiente(di+":00",df+":00",bi+":00",bf+":00");
                //console.log(e.MEDICO + e.ESPECIALIDAD + e.RANGOS_30_MINUTOS.filter(o=>o.RANGO===rangodeterminado)[0].RANGO)
                let div= `
                <div class="doctor-entry" style="background: ${fondo}; margin:1px;">
                ${e.MEDICO}<br><small>${e.ESPECIALIDAD}</small> <small>${e.CONSULTORIO}</small>
                <div class="tooltip">
                    <div><strong>Médico:</strong> ${e.MEDICO}</div>
                    <div><strong>Fecha:</strong> ${e.FECHA}</div>
                    <div><strong>Especialidad:</strong> ${e.ESPECIALIDAD}</div>
                    <div><strong>Tiempo disponible:</strong> ${e.RANGOS_30_MINUTOS.filter(o=>o.RANGO===rangodeterminado)[0].INTERSECCION} </div>
                    <div><strong>Tiempo bloqueado:</strong> ${e.RANGOS_30_MINUTOS.filter(o=>o.RANGO===rangodeterminado)[0].INTERSECCION_BLOQUEO} </div>
                    <div><strong>Consultorio:</strong> ${e.CONSULTORIO} </div>
                </div>
                </div><br>
                `
                td.innerHTML+=div;
            });
            
            
            trrrr.appendChild(td);

        });
    document.querySelector("#mitabla1 tbody").appendChild(trrrr);
    });
}

mostrarLoader();
setTimeout( ()=>{
    renderizartabla(todoslosdatos);
    ocultarLoader();
}, 0
